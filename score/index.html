function initAnalytics(){
  if(!CONFIG.GA4_ID)return;
  const s=document.createElement("script");s.async=true;
  s.src="https://www.googletagmanager.com/gtag/js?id="+CONFIG.GA4_ID;

}
function track(ev,data){

}

  stage().querySelectorAll(".scale").forEach(sc=>{
    sc.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{
      const qi=+sc.dataset.qi;a[qi]=+btn.dataset.v;

}

/* ---------- Scoring + pipeline ---------- */
const TIERS=["Base","Momentum","Impact","Amplification"];
function compute(){
  const dims={};let sum=0;
  DIMENSIONS.forEach(d=>{
    const a=state.answers[d.key]||{};
    const pts=[0,1,2,3,4].reduce((t,i)=>t+(a[i]||0),0);
    const sc=Math.round(pts/20*100);dims[d.key]=sc;sum+=sc;
  });
  const overall=Math.round(sum/DIMENSIONS.length);
  const cat=CATS.find(c=>overall<=c.max)||CATS[CATS.length-1];
  const sorted=Object.entries(dims).sort((a,b)=>a[1]-b[1]);
  const weakest=sorted.slice(0,3).map(x=>x[0]);
  const strongest=sorted.slice(-2).map(x=>x[0]).reverse();

  // Step 1 — band → allowed set
  let allowed;
  if(overall<=30)allowed=["Base","Momentum"];
  else if(overall<=50)allowed=["Momentum"];
  else if(overall<=70)allowed=["Momentum","Impact"];
  else if(overall<=85)allowed=["Impact"];
  else allowed=["Impact","Amplification"];
  // Step 2 — weakest picks within allowed
  const PREF={production:"Base",strategy:"Momentum",platform:"Momentum",distribution:"Momentum",packaging:"Impact",moment:"Momentum"};
  const pref=PREF[weakest[0]]||"Momentum";
  let plan;
  if(allowed.includes(pref))plan=pref;
  else{
    const pi=TIERS.indexOf(pref);
    plan=allowed.slice().sort((a,b)=>Math.abs(TIERS.indexOf(a)-pi)-Math.abs(TIERS.indexOf(b)-pi))[0];
  }
  // Step 3 — activation additive
  const imp=parseInt(state.qual.mimp||"0",10);
  const hasStrategic=state.qual.moments.some(m=>STRAT_MOMENTS.includes(m));
  const activation=(hasStrategic&&imp>=4)||weakest[0]==="moment"&&hasStrategic;
  // Step 4 — budget reskin (presentation only)
  const FLOOR={Base:2160,Momentum:3510,Impact:6210,Amplification:6210};
  const CEIL={[BUDGETS[0]]:2000,[BUDGETS[1]]:3500,[BUDGETS[2]]:6000,[BUDGETS[3]]:1e9,[BUDGETS[4]]:null};
  const ceil=CEIL[state.qual.budget];
  const budgetConstrained=ceil!=null&&FLOOR[plan]>ceil;

  // Lead quality (internal)
  const B={[BUDGETS[0]]:-2,[BUDGETS[1]]:2,[BUDGETS[2]]:3,[BUDGETS[3]]:4,[BUDGETS[4]]:1};
  const U={[TIMING[0]]:4,[TIMING[1]]:3,[TIMING[2]]:2,[TIMING[3]]:1,[TIMING[4]]:0};
  const D={[DECIDE[0]]:3,[DECIDE[1]]:2,[DECIDE[2]]:1,[DECIDE[3]]:0};
  const P={[PRODNEED[0]]:3,[PRODNEED[1]]:2,[PRODNEED[2]]:1,[PRODNEED[3]]:1,[PRODNEED[4]]:2};
  const bS=B[state.qual.budget]??0,uS=U[state.qual.timing]??0,dS=D[state.qual.decide]??0,pS=P[state.qual.prod]??0;
  let mS=0; if(state.qual.moments.includes("Aucun moment spécifique"))mS=0;
  else if(state.qual.moments.includes("Je ne sais pas encore"))mS=1;
  else if(hasStrategic)mS=imp>=4?4:imp>=2?3:imp===1?2:2;
  const lq=bS+uS+dS+pS+mS;
  let cat2;
  if(bS<=-2&&uS===0&&dS<=1)cat2="Low-Fit Lead";
  else if(bS>=2&&uS>=2&&dS>=2)cat2="Hot Lead";
  else if(hasStrategic)cat2="Activation Lead";
  else if(bS>=1)cat2="Qualified Lead";
  else cat2="Low-Fit Lead";

  return{dims,overall,cat,weakest,strongest,plan,activation,budgetConstrained,
    leadQuality:lq,leadCategory:cat2,scoreDetail:{bS,uS,dS,pS,mS}};
}

      <div class="btnrow"><a class="btn primary" id="book" href="${CONFIG.BOOKING_URL}" target="_blank" rel="noopener">Planifier un diagnostic Prizzz</a></div>
    </div>

    <div class="capture" id="cap">
      <h3 style="font-size:15px;font-weight:650;margin-bottom:6px">Vous voulez une recommandation personnalisée ?</h3>

      <div class="grid2">

      </div>

    let n=0;const t=setInterval(()=>{n+=Math.ceil(R.overall/28)||1;if(n>=R.overall){n=R.overall;clearInterval(t);}$("#rn").textContent=n;},34);
    stage().querySelectorAll(".track i").forEach(i=>setTimeout(()=>i.style.width=i.dataset.w+"%",120));

/* ---------- Submit ---------- */
function buildPayload(){
  return{
    session_id:state.sessionId,
    submitted_at:new Date().toISOString(),
    contact:state.contact, qualification:state.qual, utm:state.utm,
    answers:state.answers,
    scores:R?{overall:R.overall,dimensions:R.dims,category:R.cat.name}:null,
    recommendation:R?{plan:R.plan,activation:R.activation,budget_constrained:R.budgetConstrained,
      strongest:R.strongest,weakest:R.weakest}:null,
    lead:R?{quality_score:R.leadQuality,category:R.leadCategory,detail:R.scoreDetail}:null
  };
}
function sendPayload(){
  const body=buildPayload();
  if(!CONFIG.ENDPOINT_URL){console.warn("[Prizzz] ENDPOINT_URL not set — payload not sent:",body);return Promise.resolve(false);}
  return fetch(CONFIG.ENDPOINT_URL,{method:"POST",mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)})
    .then(()=>true).catch(e=>{console.error("[Prizzz] submit failed",e);return false;});
}
function submitLead(){
  const gv=id=>($("#"+id).value||"").trim();
  const email=gv("c_email");
  const links={instagram:gv("c_ig"),facebook:gv("c_fb"),x:gv("c_x"),tiktok:gv("c_tiktok"),linkedin:gv("c_linkedin"),website:gv("c_website")};
  $("#c_email").style.borderColor="";$("#c_ig").style.borderColor="";
  if(!email||!/.+@.+\..+/.test(email)){$("#c_email").focus();$("#c_email").style.borderColor="var(--blue-3)";return;}
  if(!Object.values(links).some(v=>v)){$("#c_ig").focus();$("#c_ig").style.borderColor="var(--blue-3)";return;}
  state.contact={name:gv("c_name"),company:gv("c_co"),
    email,phone:gv("c_phone"),links,role:state.qual.role||""};
  track("lead_capture_submitted",{category:R.leadCategory});
  const cap=$("#cap"); cap.innerHTML=`<div style="text-align:center"><div class="big" style="font-size:15px;font-weight:650;color:var(--lime);margin-bottom:6px">Merci, c’est noté.</div><p>Votre diagnostic est enregistré. L’équipe Banj Media revient vers vous avec une recommandation personnalisée.</p><div class="btnrow"><a class="btn primary" href="${CONFIG.BOOKING_URL}" target="_blank" rel="noopener">Planifier un diagnostic maintenant</a></div></div>`;
  cap.classList.add("ok");
  sendPayload();
}
